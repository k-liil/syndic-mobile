name: Build Android APK (Fastlane)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build APK with Fastlane
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Extract version from app.json
        id: version
        run: |
          VERSION=$(grep '"version"' app.json | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV


      - name: Run Expo Doctor
        run: npx expo-doctor

      - name: Generate native code (prebuild)
        run: npx expo prebuild --platform android --clean

      - name: Configure Gradle Memory
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties

      - name: Install Fastlane
        run: sudo gem install fastlane

      - name: Create Fastlane Fastfile
        run: |
          mkdir -p android/fastlane
          cat > android/fastlane/Fastfile << 'EOF'
          default_platform(:android)
 
          platform :android do
            desc "Build release APK"
            lane :build do
              # Decode keystore from base64 if provided
              if ENV['ANDROID_KEYSTORE_FILE_BASE64']
                sh("echo '#{ENV['ANDROID_KEYSTORE_FILE_BASE64']}' | base64 -d > #{Dir.pwd}/../syndicly-release.jks")
                UI.message("✅ Keystore created")
              end
 
              sh("chmod +x ../gradlew")
 
              gradle(
                task: "clean assembleRelease",
                options: "--info --stacktrace",
                project_dir: "./"
              )
 
              UI.success("✅ APK built successfully!")
            end
          end
          EOF
 
      - name: Build APK with Fastlane
        working-directory: ./android
        run: fastlane android build
        env:
          _JAVA_OPTIONS: "-Xmx4g -XX:MaxMetaspaceSize=1g"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
          EXPO_PUBLIC_API_URL: https://syndicly.ma
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_FILE_BASE64: ${{ secrets.ANDROID_KEYSTORE_FILE }}

      - name: Rename APK with version
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/syndic-mobile-v${{ env.VERSION }}.apk
          echo "APK_FILE=syndic-mobile-v${{ env.VERSION }}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/syndic-mobile-v${{ env.VERSION }}.apk
          retention-days: 30

      - name: Create/Update Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest-build
          name: "Latest Build - v${{ env.VERSION }}"
          prerelease: true
          files: android/app/build/outputs/apk/release/syndic-mobile-v${{ env.VERSION }}.apk
          body: |
            # Latest APK Build 📱

            **Version**: v${{ env.VERSION }}
            **Build Date**: ${{ github.event.head_commit.timestamp }}
            **Commit**: ${{ github.event.head_commit.id }}
            **Message**: ${{ github.event.head_commit.message }}

            ## 📥 Installation

            1. Download the APK below
            2. Transfer to your Android phone
            3. Open with file manager and install

            **or**

            Scan the QR code below to download directly on your phone:

            ![QR Code](https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${{ github.server_url }}/${{ github.repository }}/releases/download/latest-build/syndic-mobile-v${{ env.VERSION }}.apk)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
